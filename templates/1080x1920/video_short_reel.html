<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="template:media-width" content="1080">
    <meta name="template:media-height" content="1920">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 1080px;
            height: 1920px;
            overflow: hidden;
            font-family: {{font_family=Arial, "Helvetica Neue", sans-serif}};
            background: transparent;
        }

        .main {
            position: relative;
            width: 1080px;
            height: 1920px;
            overflow: hidden;
        }

        .top-shade {
            position: absolute;
            inset: 0;
            background: linear-gradient(
                to bottom,
                rgba(0, 0, 0, 0.48) 0%,
                rgba(0, 0, 0, 0.12) 18%,
                rgba(0, 0, 0, 0.00) 44%,
                rgba(0, 0, 0, 0.24) 72%,
                rgba(0, 0, 0, 0.72) 100%
            );
            z-index: 2;
        }

        .hook {
            position: absolute;
            top: 92px;
            left: 56px;
            right: 56px;
            z-index: 5;
            text-align: center;
            color: #ffffff;
            font-size: {{hook_font_size=56}}px;
            font-weight: 900;
            line-height: 1.12;
            text-shadow: 0 4px 18px rgba(0, 0, 0, 0.75);
            max-height: 190px;
            overflow: hidden;
        }

        .subtitle-box {
            position: absolute;
            left: 56px;
            right: 56px;
            bottom: 184px;
            z-index: 6;
            display: flex;
            justify-content: center;
        }

        .subtitle {
            display: inline-block;
            max-width: 968px;
            padding: 24px 32px;
            color: #111111;
            background: rgba(255, 255, 255, 0.94);
            border: 5px solid #111111;
            border-radius: 0;
            font-size: {{subtitle_font_size=54}}px;
            font-weight: 900;
            line-height: 1.18;
            text-align: center;
            box-shadow: 10px 10px 0 rgba(0, 0, 0, 0.45);
            overflow-wrap: anywhere;
        }

        .footer {
            position: absolute;
            left: 44px;
            right: 44px;
            bottom: 44px;
            height: 76px;
            z-index: 7;
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: #ffffff;
            text-shadow: 0 3px 10px rgba(0, 0, 0, 0.85);
        }

        .author {
            font-size: {{footer_font_size=30}}px;
            font-weight: 800;
        }

        .desc {
            font-size: {{footer_desc_font_size=22}}px;
            opacity: 0.86;
            margin-top: 4px;
        }

        .brand {
            font-size: {{footer_font_size=30}}px;
            font-weight: 900;
            text-align: right;
            max-width: 360px;
        }
    </style>
</head>
<body>
    <div class="main">
        <div class="top-shade"></div>
        <div class="subtitle-box">
            <div class="subtitle">{{text}}</div>
        </div>
        <div class="footer">
            <div>
                <div class="author">{{author=@Pixelle.AI}}</div>
                <div class="desc">{{describe=Short video series}}</div>
            </div>
           
        </div>
    </div>
</body>
</html>
